<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Contra - NES Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        
        #game-container {
            position: relative;
        }
        
        canvas {
            border: 4px solid #fff;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
        }
        
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        #game-over-screen {
            display: none;
        }
        
        h1 {
            font-size: 42px;
            color: #ff4444;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 20px;
        }
        
        .controls {
            margin: 20px 0;
            text-align: center;
            line-height: 1.8;
        }
        
        button {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            padding: 15px 30px;
            margin: 10px;
            background: #ff4444;
            color: #fff;
            border: 3px solid #fff;
            cursor: pointer;
        }
        
        button:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="512" height="448"></canvas>
        
        <div id="ui">
            <div>1P: <span id="score">000000</span></div>
            <div>LIVES: <span id="lives">3</span></div>
            <div>WEAPON: <span id="weapon">NORMAL</span></div>
        </div>
        
        <div id="start-screen">
            <h1>SUPER CONTRA</h1>
            <div class="controls">
                <p><strong>CONTROLS:</strong></p>
                <p>←→ = Move | ↑/↓ = Cycle Aim (0° → 45° → 90°)</p>
                <p>Z = Jump | X = Shoot | C = Crouch (lay flat)</p>
                <p>Enter = Start Game</p>
            </div>
            <button onclick="startGame()">START GAME</button>
        </div>
        
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button onclick="restartGame()">TRY AGAIN</button>
        </div>
    </div>

    <script src="game.js?v=2"></script>
</body>
</html>
